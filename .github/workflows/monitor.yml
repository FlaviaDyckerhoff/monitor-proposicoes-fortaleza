name: Monitor Matérias CMFor

on:
  schedule:
    - cron: '36 9 * * *'   # 06:36 BRT
  workflow_dispatch:
    inputs:
      catchup_from:
        description: 'Data inicial do catch-up (YYYY-MM-DD)'
        required: false
        default: ''
      email_destino_override:
        description: 'Destino temporário do email'
        required: false
        default: ''

jobs:
  monitorar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Executar monitor
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          EMAIL_DESTINO_OVERRIDE: ${{ github.event.inputs.email_destino_override }}
          CATCHUP_FROM: ${{ github.event.inputs.catchup_from }}
        run: node monitor.js

      - name: Salvar estado atualizado no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f estado.json ]; then
            echo '{"proposicoes_vistas":[],"ultima_execucao":""}' > estado.json
          fi
          git add estado.json
          git diff --staged --quiet || git commit -m "chore: atualiza estado [skip ci]"
          git push
